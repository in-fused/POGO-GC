    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    <!-- (All HTML elements are identical to your last file – only the script below changed) -->
    <!-- Install Prompt, Login, Chat, Raid Modal, Map, Floating Button, Bottom Nav – all unchanged -->

    <script>
        // =============================================
        // POKE RAID CHAT – NOW WITH FULL ABLY ERROR HANDLING
        // =============================================

        // 🔥 REPLACE THIS WITH YOUR REAL ABLY KEY FROM ably.com
        const ABLY_KEY = 'r8Lx5w.Ai1XrA:ladc1xtXqpWe6JKwQ24l0zgA9iQ8r48vs7Px2AzFqmM';   // ←←← YOUR KEY HERE

        let ably = null;
        let channel = null;
        let map = null;
        let currentUsername = '';
        let currentTeam = '';
        let currentGroup = 'GLOBAL';
        let pokemonIdMap = {};
        let markers = new Map();

        function initTailwind() {
            tailwind.config = { content: [], theme: { extend: {} } };
        }

        function selectTeam(team) { /* unchanged */ 
            currentTeam = team;
            document.querySelectorAll('.team-btn').forEach(btn => {
                const selected = btn.dataset.team === team;
                btn.classList.toggle('opacity-100', selected);
                btn.classList.toggle('opacity-60', !selected);
                btn.classList.toggle('ring-4', selected);
                btn.classList.toggle('ring-white/50', selected);
            });
        }

        async function joinChat() {
            const username = document.getElementById('usernameInput').value.trim();
            const group = document.getElementById('groupInput').value.trim().toUpperCase();

            if (!username) return alert("Trainer name required!");
            if (!currentTeam) return alert("Select your team!");

            currentUsername = username;
            currentGroup = group || 'GLOBAL';

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            document.getElementById('groupName').textContent = currentGroup === 'GLOBAL' ? '🌍 Global Chat' : `🔒 ${currentGroup}`;

            document.getElementById('onlineCount').innerHTML = 'Connecting to Ably...';

            await initializeAbly();
            await loadPokemonData();
            loadRaidBosses();

            appendSystemMessage(`👋 Welcome, <strong>${currentUsername}</strong>! Team <span class="team-${currentTeam} px-2 py-0.5 rounded text-xs">${currentTeam.toUpperCase()}</span>`);
        }

        async function initializeAbly() {
            if (ably) return;

            ably = new Ably.Realtime({ 
                key: ABLY_KEY, 
                clientId: currentUsername,
                autoConnect: true
            });

            // Real-time connection status feedback
            ably.connection.on('connecting', () => {
                document.getElementById('onlineCount').innerHTML = '🔄 Connecting...';
            });
            ably.connection.on('connected', () => {
                document.getElementById('onlineCount').innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse inline-block"></span> Connected';
            });
            ably.connection.on('failed', (err) => {
                console.error('Ably failed:', err);
                document.getElementById('onlineCount').innerHTML = '❌ Failed – check your Ably key';
                alert('Ably connection failed.\n\n1. Make sure you replaced ABLY_KEY with your real key from ably.com\n2. Check your internet connection');
            });
            ably.connection.on('suspended', () => {
                document.getElementById('onlineCount').innerHTML = '⏳ Reconnecting...';
            });

            await new Promise(resolve => ably.connection.once('connected', resolve));

            const channelName = `poke-raid-${currentGroup}`;
            channel = ably.channels.get(channelName);

            channel.subscribe('message', msg => appendMessage(msg.data));
            channel.subscribe('typing', msg => { if (msg.data.username !== currentUsername) showTypingIndicator(msg.data.username); });
            channel.subscribe(['spawn', 'nest'], msg => addMapMarker(msg.data));

            channel.presence.subscribe(['enter','leave','update'], updateOnlineCount);
            await channel.presence.enter({ username: currentUsername, team: currentTeam });

            updateOnlineCount();
        }

        // The rest of your functions (loadPokemonData, appendMessage, reportLocation, addMapMarker, toggleTab, etc.) are unchanged and identical to the previous version.

        // (All other functions omitted here for brevity – they are exactly the same as the last file you had)

        // START
        initTailwind();
        console.log('%c🚀 PokeRaid Chat ready – Ably v2 connected!', 'color:#6C5CE7; font-weight:bold');
    </script>
