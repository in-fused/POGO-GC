<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PokeRaid</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-icon"><i class="fas fa-dragon"></i></div>
      <h1>Poke<em>Raid</em></h1>
      <p>Coordinate raids with your group</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="loginName">Trainer Name</label>
      <input id="loginName" class="form-input" type="text" placeholder="Your trainer name" maxlength="20" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label" for="loginGroup">Group Code <span style="opacity:0.5;font-weight:400;">(optional)</span></label>
      <input id="loginGroup" class="form-input" type="text" placeholder="Leave blank for Global" maxlength="12" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">Your Team</label>
      <div class="team-grid">
        <button id="btn-mystic"   class="tbtn t-mystic"   onclick="selectTeam('mystic')">
          <i class="fas fa-water"></i><br>Mystic
        </button>
        <button id="btn-valor"    class="tbtn t-valor"    onclick="selectTeam('valor')">
          <i class="fas fa-fire"></i><br>Valor
        </button>
        <button id="btn-instinct" class="tbtn t-instinct" onclick="selectTeam('instinct')">
          <i class="fas fa-bolt"></i><br>Instinct
        </button>
      </div>
    </div>

    <button class="join-btn" onclick="joinChat()">
      <i class="fas fa-sign-in-alt"></i> Enter PokeRaid
    </button>

  </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════ -->
<div id="app">

  <!-- ── TOPBAR ── -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-emblem"><i class="fas fa-dragon"></i></div>
      <div>
        <h1 id="appTitle" class="topbar-title">Poke<em>Raid</em></h1>
        <div class="topbar-sub">
          <div class="live-dot"></div>
          <span id="statTxt">Connecting&hellip;</span>
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbtn" onclick="shareGroup()" title="Share group"><i class="fas fa-share-alt"></i></button>
    </div>
  </div>

  <!-- ── TAB BAR ── -->
  <div class="tabbar">
    <button id="tab-chat"  class="tabt" onclick="goTab('chat')">
      <span class="tab-icon"><i class="fas fa-comment-dots"></i></span>Chat
    </button>
    <button id="tab-map"   class="tabt" onclick="goTab('map')">
      <span class="tab-icon"><i class="fas fa-map-marked-alt"></i></span>Map
    </button>
    <button id="tab-raids" class="tabt" onclick="goTab('raids')">
      <span class="tab-icon"><i class="fas fa-dragon"></i></span>Raids
    </button>
    <button id="tab-guide" class="tabt" onclick="goTab('guide')">
      <span class="tab-icon"><i class="fas fa-book-open"></i></span>Guide
    </button>
    <button id="tab-me"    class="tabt" onclick="goTab('me')">
      <span class="tab-icon"><i class="fas fa-user-circle"></i></span>Me
    </button>
  </div>

  <!-- ════════════════════════════
       PANE: CHAT
  ════════════════════════════ -->
  <div id="pane-chat" class="pane">

    <!-- Raid pin strip -->
    <div id="raidStrip">
      <span class="rs-label"></span>
    </div>

    <!-- Message feed -->
    <div id="msgFeed"></div>

    <!-- Chat footer: online row + input -->
    <div class="chat-foot">
      <div id="onlineRow" class="online-row"></div>
      <div class="input-row">
        <button class="raid-fab" onclick="openRaidModal()" title="Post a raid">
          <i class="fas fa-plus"></i>
        </button>
        <div class="msg-wrap">
          <input id="msgIn" type="text" placeholder="Message&hellip;" maxlength="300" autocomplete="off">
          <button class="send-btn" onclick="sendMsg()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════
       PANE: MAP
  ════════════════════════════ -->
  <div id="pane-map" class="pane">

    <!-- Leaflet map -->
    <div id="map"></div>

    <!-- Weather HUD -->
    <div id="wHUD">
      <div id="wLoad" class="wload"><i class="fas fa-spinner fa-spin"></i> Loading weather&hellip;</div>
      <div id="wBody" class="wbody">
        <div class="wtop">
          <span id="wIcon" class="wicon"></span>
          <div>
            <div id="wCond" class="wcond"></div>
            <div id="wTemp" class="wtemp"></div>
          </div>
        </div>
        <div id="wLabel" class="wlabel"></div>
        <div id="wTypes" class="wtypes"></div>
      </div>
    </div>

    <!-- Biome panel -->
    <div id="biomeP"></div>

    <!-- Map FABs -->
    <div class="mfabs">
      <button class="mfab mf-raids"  onclick="toggleRaidBoard()" title="Raid bosses">
        <i class="fas fa-dragon"></i>
      </button>
      <button class="mfab mf-center" onclick="centerMap()" title="Center on me">
        <i class="fas fa-crosshairs"></i>
      </button>
      <button class="mfab mf-weather" onclick="refreshWeather()" title="Refresh weather">
        <i class="fas fa-cloud-sun"></i>
      </button>
    </div>

    <!-- Float button -->
    <button id="floatBtn" onclick="toggleFloat()" title="Float map">
      <i class="fas fa-layer-group"></i>
    </button>

    <!-- Raid board slide-in -->
    <div id="raidBoard">
      <div class="rb-hd">
        <span><i class="fas fa-dragon"></i> Active Raids</span>
        <button class="rb-close" onclick="toggleRaidBoard()"><i class="fas fa-times"></i></button>
      </div>
      <div id="rbContent"></div>
    </div>

  </div>

  <!-- ════════════════════════════
       PANE: RAIDS
  ════════════════════════════ -->
  <div id="pane-raids" class="pane">

    <!-- Sticky top: search + filters -->
    <div class="raids-top">
      <input id="raidSearch" class="raids-search" type="text" placeholder="Search bosses&hellip;" autocomplete="off">
      <div class="filter-pills">
        <button class="fpill fp-all on"    data-f="all"    onclick="setRaidFilter('all')">All</button>
        <button class="fpill fp-t5 off"    data-f="t5"     onclick="setRaidFilter('t5')">T5 / Legendary</button>
        <button class="fpill fp-mega off"  data-f="mega"   onclick="setRaidFilter('mega')">Mega</button>
        <button class="fpill fp-shadow off" data-f="shadow" onclick="setRaidFilter('shadow')">Shadow</button>
        <button class="fpill fp-t3 off"    data-f="t3"     onclick="setRaidFilter('t3')">T3</button>
        <button class="fpill fp-t1 off"    data-f="t1"     onclick="setRaidFilter('t1')">T1</button>
      </div>
    </div>

    <!-- Scrollable boss grid -->
    <div class="raids-inner">
      <div id="bossGrid">
        <div class="empty-state">
          <div class="em-icon">&#x23F3;</div>
          <p>Fetching live raid bosses&hellip;</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════
       PANE: GUIDE
  ════════════════════════════ -->
  <div id="pane-guide" class="pane">

    <!-- Sticky top: guide tabs -->
    <div class="guide-top">
      <div class="guide-tabs">
        <button class="gtab on"  data-g="shinies"  onclick="switchGuide('shinies')">&#x2728; Shinies</button>
        <button class="gtab off" data-g="dittos"   onclick="switchGuide('dittos')">&#x1F300; Ditto</button>
        <button class="gtab off" data-g="nests"    onclick="switchGuide('nests')">&#x1F3E0; Nests</button>
        <button class="gtab off" data-g="weather"  onclick="switchGuide('weather')">&#x26C5; Weather</button>
        <button class="gtab off" data-g="migrate"  onclick="switchGuide('migrate')">&#x1F4C5; Migration</button>
      </div>
    </div>

    <!-- Scrollable body containing all guide sections -->
    <div class="guide-body">

      <!-- Shinies -->
      <div id="guide-shinies" class="guide-section vis">
        <input id="shinySearch" class="guide-search" type="text" placeholder="Search shinies&hellip;" autocomplete="off">
        <div id="shinyList">
          <div class="empty-state">
            <div class="em-icon">&#x23F3;</div>
            <p>Loading shiny data&hellip;</p>
          </div>
        </div>
      </div>

      <!-- Dittos -->
      <div id="guide-dittos" class="guide-section">
        <div id="dittoList">
          <div class="empty-state">
            <div class="em-icon">&#x23F3;</div>
            <p>Loading&hellip;</p>
          </div>
        </div>
      </div>

      <!-- Nests -->
      <div id="guide-nests" class="guide-section">
        <div id="nestList">
          <div class="empty-state">
            <div class="em-icon">&#x23F3;</div>
            <p>Loading&hellip;</p>
          </div>
        </div>
      </div>

      <!-- Weather guide -->
      <div id="guide-weather" class="guide-section">
        <div id="wxGuide"></div>
      </div>

      <!-- Migration -->
      <div id="guide-migrate" class="guide-section">
        <div id="migrateSection"></div>
      </div>

    </div>
  </div>

  <!-- ════════════════════════════
       PANE: ME
  ════════════════════════════ -->
  <div id="pane-me" class="pane">
    <div class="me-body">

      <!-- Trainer card -->
      <div id="trainerCard" class="trainer-card none">
        <div id="trainerName" class="trainer-name">&#x2014;</div>
        <div id="trainerTeam" class="trainer-team">No team</div>
      </div>

      <!-- Group info -->
      <div class="me-section">
        <div class="me-section-title">Group</div>
        <div class="me-card">
          <div class="me-row">
            <span class="me-key">Active group</span>
            <span id="groupDisplay" class="me-val">GLOBAL</span>
          </div>
          <div class="me-btn-row">
            <button class="me-btn me-btn-leave" onclick="leaveGroup()">Leave Group</button>
            <button class="me-btn me-btn-copy" onclick="shareGroup()">Share</button>
          </div>
        </div>
      </div>

      <!-- Friend Code -->
      <div class="me-section">
        <div class="me-section-title">Friend Code</div>
        <div class="me-card">
          <label class="me-field-label" for="fcInput">Trainer Friend Code</label>
          <input id="fcInput" class="me-input" type="text" placeholder="0000 0000 0000" maxlength="20" autocomplete="off">
          <div class="me-btn-row">
            <button class="me-btn me-btn-save" onclick="saveFriendCode()">Save</button>
            <button class="me-btn me-btn-copy" onclick="copyFriendCode()">Copy</button>
          </div>
        </div>
      </div>

      <!-- OpenWeatherMap key -->
      <div class="me-section">
        <div class="me-section-title">Weather API Key</div>
        <div class="me-card">
          <label class="me-field-label" for="owmInput">OpenWeatherMap Key</label>
          <input id="owmInput" class="me-input" type="text" placeholder="Free key from openweathermap.org" autocomplete="off">
          <div class="me-btn-row">
            <button class="me-btn me-btn-save" onclick="saveOWMKey()">Save Key</button>
          </div>
        </div>
      </div>

      <!-- Data sources -->
      <div class="me-section">
        <div class="me-section-title">Data Sources</div>
        <div class="me-card">
          <div id="dataSources"></div>
        </div>
      </div>

      <!-- Leave -->
      <div class="me-section">
        <div class="me-btn-row">
          <button class="me-btn me-btn-leave" onclick="leaveChat()">Leave PokeRaid</button>
        </div>
      </div>

    </div>
  </div>

</div><!-- #app -->

<!-- ═══════════════════════════════════════════
     RAID MODAL (bottom sheet)
═══════════════════════════════════════════ -->
<div id="raidModal" class="modal-overlay" onclick="closeBg(event,'raidModal')">
  <div class="modal-sheet">
    <div class="mhandle"></div>
    <div class="mtitle"><i class="fas fa-dragon"></i> Post a Raid</div>

    <div class="mgroup">
      <label class="mlbl">Raid Boss</label>
      <input id="mRaidBoss" class="min" type="text" placeholder="e.g. Rayquaza" list="bossDL" autocomplete="off">
      <datalist id="bossDL"></datalist>
    </div>

    <div class="mgroup">
      <label class="mlbl">Gym Location</label>
      <input id="mRaidLoc" class="min" type="text" placeholder="Gym name or address" autocomplete="off">
    </div>

    <div class="mrow2">
      <div class="mgroup">
        <label class="mlbl">Start Time</label>
        <input id="mRaidTime" class="min" type="time">
      </div>
      <div class="mgroup">
        <label class="mlbl">Players Needed</label>
        <select id="mRaidPlayers" class="min">
          <option value="2">2 players</option>
          <option value="3">3 players</option>
          <option value="4">4 players</option>
          <option value="5" selected>5 players</option>
          <option value="6+">6+ players</option>
        </select>
      </div>
    </div>

    <button class="mpostbtn" onclick="postRaid()">
      <i class="fas fa-bullhorn"></i> Post Raid Alert
    </button>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
