<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Pokémon Go Raid Coordination Chat + Live Spawn/Nest Map">
    <title>PokeRaid Chat</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUG9rZVJhaWQgQ2hhdCIsInNob3J0X25hbWUiOiJQb2tlUmFpZCIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjNmM1Y2U3IiwidGhlbWVfY29sb3IiOiIjNmM1Y2U3In0=">
    
    <!-- Tailwind + Fonts + Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ably/1.2.45/ably.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .message-bubble {
            animation: slideIn 0.3s ease-out;
            max-width: 85%;
            word-wrap: break-word;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .raid-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            box-shadow: 0 4px 15px rgba(238, 90, 90, 0.4);
        }
        
        .floating-mode {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 500px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 9999;
            overflow: hidden;
        }
        
        @media (max-width: 640px) {
            .floating-mode {
                width: calc(100vw - 40px);
                height: 60vh;
            }
        }
        
        .minimized {
            width: 60px !important;
            height: 60px !important;
            border-radius: 50% !important;
            overflow: hidden;
        }
        
        .team-mystic { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .team-valor { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }
        .team-instinct { background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%); }
        
        #map { height: 100%; width: 100%; z-index: 1; }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .leaflet-popup-tip { box-shadow: none; }
        
        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        /* Tailwind script will handle the rest */
    </style>
</head>
<body class="antialiased">

    <!-- Install Prompt -->
    <div id="installPrompt" class="fixed top-0 left-0 right-0 bg-gradient-to-r from-purple-600 to-pink-600 text-white p-4 z-[11000] hidden transform transition-transform duration-300">
        <div class="max-w-lg mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-mobile-alt text-2xl"></i>
                <div>
                    <p class="font-semibold">Install PokeRaid Chat</p>
                    <p class="text-sm opacity-90">Add to home screen for floating overlay while playing Pokémon GO</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="dismissInstall()" class="px-3 py-1 text-sm opacity-80 hover:opacity-100">Later</button>
                <button onclick="installPWA()" class="px-4 py-2 bg-white text-purple-600 rounded-lg font-semibold text-sm hover:bg-gray-100 transition">Install</button>
            </div>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center p-4 z-40">
        <div class="glass rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                    <i class="fas fa-comments text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">PokeRaid Chat</h1>
                <p class="text-gray-600">Live chat • Raids • Spawn map</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Trainer Name</label>
                    <input type="text" id="usernameInput" placeholder="AshKetchum99" 
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none transition text-lg"
                        maxlength="20">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Team</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectTeam('mystic')" class="team-btn team-mystic py-3 rounded-xl text-white font-semibold opacity-60 hover:opacity-100 transition flex items-center justify-center" data-team="mystic">
                            <i class="fas fa-snowflake mr-1"></i> Mystic
                        </button>
                        <button onclick="selectTeam('valor')" class="team-btn team-valor py-3 rounded-xl text-white font-semibold opacity-60 hover:opacity-100 transition flex items-center justify-center" data-team="valor">
                            <i class="fas fa-fire mr-1"></i> Valor
                        </button>
                        <button onclick="selectTeam('instinct')" class="team-btn team-instinct py-3 rounded-xl text-white font-semibold opacity-60 hover:opacity-100 transition flex items-center justify-center" data-team="instinct">
                            <i class="fas fa-bolt mr-1"></i> Instinct
                        </button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Group Code (optional)</label>
                    <input type="text" id="groupInput" placeholder="e.g., DOWNTOWNRAIDS" 
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none transition uppercase"
                        maxlength="20">
                    <p class="text-xs text-gray-500 mt-1">Empty = Global Chat</p>
                </div>
                
                <button onclick="joinChat()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition mt-6">
                    <i class="fas fa-play mr-2"></i> Join Raid Hub
                </button>
            </div>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chatInterface" class="hidden fixed inset-0 flex flex-col">
        <!-- Header -->
        <div class="glass border-b border-gray-200 px-4 py-3 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-comments text-white"></i>
                </div>
                <div>
                    <h2 class="font-bold text-gray-800" id="groupName">Global Chat</h2>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span id="onlineCount">Connecting...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleFloatingMode()" class="p-2 hover:bg-gray-100 rounded-lg transition" title="Floating Mode">
                    <i class="fas fa-window-restore text-gray-600"></i>
                </button>
                <button onclick="shareGroup()" class="p-2 hover:bg-gray-100 rounded-lg transition" title="Share Group">
                    <i class="fas fa-share-alt text-gray-600"></i>
                </button>
                <button onclick="leaveChat()" class="p-2 hover:bg-red-100 rounded-lg transition" title="Leave">
                    <i class="fas fa-sign-out-alt text-red-500"></i>
                </button>
            </div>
        </div>

        <!-- Raid Bosses Banner -->
        <div id="raidBanner" class="bg-gradient-to-r from-red-500 to-pink-500 text-white text-xs px-4 py-1.5 flex items-center gap-2 overflow-x-auto whitespace-nowrap shrink-0 hidden">
            <!-- Populated by JS -->
        </div>

        <!-- Messages Container -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth bg-gray-50">
            <!-- Welcome added by JS -->
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="hidden px-4 py-2 bg-gray-50">
            <div class="flex items-center gap-2 text-sm text-gray-500">
                <div class="typing-indicator flex gap-1">
                    <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                </div>
                <span id="typingText">Someone is typing...</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white border-t border-gray-200 px-4 py-2 flex gap-2 overflow-x-auto shrink-0">
            <button onclick="sendQuickMessage('🥚 Egg hatching in 5 min!')" class="whitespace-nowrap px-3 py-1.5 bg-blue-100 text-blue-700 rounded-full text-sm font-medium hover:bg-blue-200 transition">🥚 5min</button>
            <button onclick="sendQuickMessage('🚨 Raid starting now! Join us!')" class="whitespace-nowrap px-3 py-1.5 bg-red-100 text-red-700 rounded-full text-sm font-medium hover:bg-red-200 transition">🚨 Starting</button>
            <button onclick="sendQuickMessage('📍 Moving to next gym')" class="whitespace-nowrap px-3 py-1.5 bg-green-100 text-green-700 rounded-full text-sm font-medium hover:bg-green-200 transition">📍 Moving</button>
            <button onclick="sendQuickMessage('👋 On my way!')" class="whitespace-nowrap px-3 py-1.5 bg-purple-100 text-purple-700 rounded-full text-sm font-medium hover:bg-purple-200 transition">👋 OTW</button>
            <button onclick="sendQuickMessage('✅ Here!')" class="whitespace-nowrap px-3 py-1.5 bg-yellow-100 text-yellow-700 rounded-full text-sm font-medium hover:bg-yellow-200 transition">✅ Here</button>
        </div>

        <!-- Input Area -->
        <div class="glass border-t border-gray-200 p-4 shrink-0">
            <div class="flex gap-2">
                <button onclick="toggleRaidForm()" class="p-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl shadow-lg hover:shadow-xl transition shrink-0">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="flex-1 relative">
                    <input type="text" id="messageInput" placeholder="Type a message or raid tip..." 
                        class="w-full px-4 py-3 pr-12 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:outline-none transition"
                        onkeypress="handleKeyPress(event)"
                        oninput="handleTyping()">
                    <button onclick="sendMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Raid Form Modal -->
    <div id="raidModal" class="hidden fixed inset-0 bg-black/50 z-[10000] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass rounded-2xl p-6 w-full max-w-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Post a Raid</h3>
                <button onclick="toggleRaidForm()" class="p-2 hover:bg-gray-100 rounded-lg">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pokémon/Boss</label>
                    <input type="text" id="raidBoss" placeholder="e.g., Kyogre" class="w-full px-3 py-2 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location/Gym</label>
                    <input type="text" id="raidLocation" placeholder="e.g., Central Park Gym" class="w-full px-3 py-2 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                        <input type="time" id="raidTime" class="w-full px-3 py-2 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Players Needed</label>
                        <select id="raidPlayers" class="w-full px-3 py-2 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none">
                            <option value="1">1+</option>
                            <option value="3">3+</option>
                            <option value="5" selected>5+</option>
                            <option value="10">10+</option>
                        </select>
                    </div>
                </div>
                <button onclick="postRaid()" class="w-full py-3 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl font-bold shadow-lg hover:shadow-xl transition mt-2">
                    <i class="fas fa-broadcast-tower mr-2"></i> Post Raid
                </button>
            </div>
        </div>
    </div>

    <!-- Map Interface -->
    <div id="mapInterface" class="hidden fixed inset-0 flex flex-col bg-white z-30">
        <div class="glass border-b px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-map-marked-alt text-3xl text-purple-600"></i>
                <h2 class="font-bold text-gray-800" id="mapGroupName">Live Spawn &amp; Nest Map</h2>
            </div>
            <button onclick="toggleTab('chat')" class="px-4 py-2 bg-purple-600 text-white rounded-xl text-sm font-medium flex items-center gap-1">
                <i class="fas fa-comments"></i> Chat
            </button>
        </div>
        <div id="map" class="flex-1 relative"></div>
        
        <!-- Map floating controls -->
        <div class="absolute bottom-6 right-6 flex flex-col gap-2 z-[10000]">
            <button onclick="reportLocation('spawn')" class="w-12 h-12 bg-green-500 text-white rounded-2xl shadow-xl flex items-center justify-center text-2xl hover:scale-110 transition">📍</button>
            <button onclick="reportLocation('nest')" class="w-12 h-12 bg-orange-500 text-white rounded-2xl shadow-xl flex items-center justify-center text-2xl hover:scale-110 transition">🏠</button>
            <button onclick="centerMyLocation()" class="w-12 h-12 bg-purple-600 text-white rounded-2xl shadow-xl flex items-center justify-center text-2xl hover:scale-110 transition">🧭</button>
        </div>
    </div>

    <!-- Floating Toggle Button -->
    <button id="floatingToggle" onclick="toggleFloatingMode()" class="hidden fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-full shadow-2xl z-[11000] items-center justify-center pulse-ring">
        <i class="fas fa-comments text-2xl"></i>
        <span id="unreadBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center hidden">0</span>
    </button>

    <!-- Bottom Navigation (mobile friendly) -->
    <div id="bottomNav" class="bottom-nav hidden flex items-center justify-around py-2 text-sm font-medium text-gray-600">
        <button onclick="toggleTab('chat')" class="flex flex-col items-center gap-1 active:scale-95 transition" id="navChat">
            <i class="fas fa-comments text-xl"></i>
            <span class="text-[10px]">Chat</span>
        </button>
        <button onclick="toggleTab('map')" class="flex flex-col items-center gap-1 active:scale-95 transition" id="navMap">
            <i class="fas fa-map-marked-alt text-xl"></i>
            <span class="text-[10px]">Map</span>
        </button>
    </div>

    <script>
        // =============================================
        // POKE RAID CHAT + LIVE MAP – FULLY FIXED & IMPROVED
        // Single file PWA – March 2026 ready
        // =============================================

        // Your real Ably key
        const ABLY_KEY = 'r8Lx5w.Ai1XrA:ladc1xtXqpWe6JKwQ24l0zgA9iQ8r48vs7Px2AzFqmM';

        let ably = null;
        let channel = null;
        let map = null;
        let currentUsername = '';
        let currentTeam = '';
        let currentGroup = 'GLOBAL';
        let isFloating = false;
        let unreadCount = 0;
        let typingTimeout = null;
        let lastTypingTime = 0;
        let pokemonIdMap = {};           // name → id for sprites
        let markers = new Map();         // timestamp → Leaflet marker

        // Tailwind initialization
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: { extend: {} }
            };
        }

        // Select team
        function selectTeam(team) {
            currentTeam = team;
            document.querySelectorAll('.team-btn').forEach(btn => {
                btn.classList.toggle('opacity-100', btn.dataset.team === team);
                btn.classList.toggle('opacity-60', btn.dataset.team !== team);
                btn.classList.toggle('ring-4', btn.dataset.team === team);
                btn.classList.toggle('ring-white/50', btn.dataset.team === team);
            });
        }

        // Join chat
        async function joinChat() {
            const usernameInput = document.getElementById('usernameInput').value.trim();
            const groupInput = document.getElementById('groupInput').value.trim().toUpperCase();

            if (!usernameInput) return alert("Trainer name required!");
            if (!currentTeam) return alert("Select your team!");

            currentUsername = usernameInput;
            currentGroup = groupInput || 'GLOBAL';

            // Hide login, show chat
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            document.getElementById('groupName').textContent = currentGroup === 'GLOBAL' ? '🌍 Global Chat' : `🔒 ${currentGroup}`;

            await initializeAbly();
            await loadPokemonData();           // for map sprites
            loadRaidBosses();                  // banner

            // Welcome message
            appendSystemMessage(`👋 Welcome, <strong>${currentUsername}</strong>! Team <span class="team-${currentTeam} px-2 py-0.5 rounded text-xs">${currentTeam.toUpperCase()}</span>`);
            
            // Demo message
            setTimeout(() => {
                if (channel) appendMessage({ username: "System", team: "global", text: "Live spawns & nests now appear on the Map tab! Tap the map icons to report.", timestamp: Date.now(), type: 'chat' });
            }, 1500);
        }

        // Initialize Ably
        async function initializeAbly() {
            if (ably) return;
            ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUsername });
            
            await new Promise(resolve => ably.connection.once('connected', resolve));
            
            const channelName = `poke-raid-${currentGroup}`;
            channel = ably.channels.get(channelName);

            // Messages & raids
            channel.subscribe('message', msg => {
                appendMessage(msg.data);
                document.getElementById('typingIndicator').classList.add('hidden');
            });

            // Typing
            channel.subscribe('typing', msg => {
                if (msg.data.username !== currentUsername) showTypingIndicator(msg.data.username);
            });

            // Spawn / Nest reports
            channel.subscribe(['spawn', 'nest'], msg => addMapMarker(msg.data));

            // Presence
            channel.presence.subscribe(['enter','leave','update'], updateOnlineCount);
            await channel.presence.enter({ username: currentUsername, team: currentTeam });

            updateOnlineCount();
        }

        // Load full Pokémon name → ID map (1025 Pokémon)
        async function loadPokemonData() {
            try {
                const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                const data = await res.json();
                pokemonIdMap = {};
                data.results.forEach(p => {
                    const id = p.url.split('/')[6];
                    pokemonIdMap[p.name] = parseInt(id);
                });
                console.log('✅ Pokémon sprite map loaded (' + Object.keys(pokemonIdMap).length + ' Pokémon)');
            } catch(e) {
                console.warn('PokeAPI fallback – using defaults');
                pokemonIdMap = { pikachu:25, charmander:4, bulbasaur:1, squirtle:7, mewtwo:150, kyogre:382, rayquaza:384 };
            }
        }

        function getPokemonId(name) {
            if (!name) return 25;
            const key = name.toLowerCase().trim();
            return pokemonIdMap[key] || 25;
        }

        // Current raid bosses banner
        async function loadRaidBosses() {
            try {
                const res = await fetch('https://pogoapi.net/api/v1/raid_bosses.json');
                const data = await res.json();
                const banner = document.getElementById('raidBanner');
                
                let html = `<i class="fas fa-dragon"></i> <span class="font-bold">LIVE RAIDS:</span> `;
                if (data.current && Array.isArray(data.current)) {
                    data.current.slice(0, 6).forEach(b => {
                        html += `<span class="inline-block bg-white/20 px-3 py-px mx-1 rounded-3xl text-xs">${b}</span> `;
                    });
                } else {
                    html += `Regieleki • Mega Houndoom • Regidrago`;
                }
                banner.innerHTML = html;
                banner.classList.remove('hidden');
            } catch(e) {}
        }

        // Append message
        function appendMessage(data) {
            const container = document.getElementById('messagesContainer');
            const isMine = data.username === currentUsername;

            let html = '';
            if (data.type === 'raid') {
                html = `
                <div class="raid-card text-white rounded-3xl p-5 mx-auto max-w-xs">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="inline-flex items-center gap-2 bg-white/20 text-xs px-3 py-1 rounded-3xl mb-2"><i class="fas fa-dragon"></i> RAID</div>
                            <p class="font-bold text-xl">${data.boss}</p>
                            <p class="opacity-90">${data.location}</p>
                        </div>
                        <div class="text-right text-sm">
                            <div class="font-mono">${data.time}</div>
                            <div class="mt-1 text-xs opacity-75">${data.players} needed</div>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <button onclick="joinRaid(this)" class="bg-white text-red-600 px-5 py-2 rounded-2xl font-bold text-sm hover:scale-105 transition">JOIN RAID</button>
                        <div class="text-xs opacity-75">by ${data.username}</div>
                    </div>
                </div>`;
            } else {
                html = `
                <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
                    <div class="message-bubble ${isMine ? 'bg-purple-600 text-white' : 'bg-white text-gray-800 shadow'} rounded-3xl px-5 py-3">
                        ${!isMine ? `<div class="flex items-center gap-2 text-xs font-medium mb-1"><span class="team-${data.team} text-white px-2 py-px rounded-full text-[10px]">${data.team.toUpperCase()}</span>${data.username}</div>` : ''}
                        <p class="text-[15px]">${data.text}</p>
                        <div class="text-[10px] opacity-70 mt-1 text-right">${new Date(data.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                </div>`;
            }
            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }

        function appendSystemMessage(text) {
            const container = document.getElementById('messagesContainer');
            container.insertAdjacentHTML('beforeend', `
                <div class="text-center py-3">
                    <div class="inline-flex items-center gap-2 px-4 py-2 bg-purple-100 text-purple-700 rounded-3xl text-sm">${text}</div>
                </div>`);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !channel) return;
            const msg = { username: currentUsername, team: currentTeam, text, timestamp: Date.now(), type: 'chat' };
            channel.publish('message', msg);
            appendMessage(msg);
            input.value = '';
        }

        function sendQuickMessage(text) {
            if (!channel) return;
            const msg = { username: currentUsername, team: currentTeam, text, timestamp: Date.now(), type: 'chat' };
            channel.publish('message', msg);
            appendMessage(msg);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function handleTyping() {
            if (!channel) return;
            const now = Date.now();
            if (now - lastTypingTime > 1200) {
                channel.publish('typing', { username: currentUsername });
                lastTypingTime = now;
            }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {}, 1500);
        }

        function showTypingIndicator(username) {
            const ind = document.getElementById('typingIndicator');
            document.getElementById('typingText').innerHTML = `<strong>${username}</strong> is typing...`;
            ind.classList.remove('hidden');
            setTimeout(() => ind.classList.add('hidden'), 2800);
        }

        async function updateOnlineCount() {
            if (!channel) return;
            try {
                const members = await channel.presence.get();
                document.getElementById('onlineCount').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse inline-block"></span> ${members.length} online`;
            } catch(e) {}
        }

        function postRaid() {
            const boss = document.getElementById('raidBoss').value.trim();
            const location = document.getElementById('raidLocation').value.trim();
            const time = document.getElementById('raidTime').value;
            const players = document.getElementById('raidPlayers').value;

            if (!boss || !location || !time) return alert("Fill all fields!");

            const raidData = {
                username: currentUsername,
                team: currentTeam,
                type: 'raid',
                boss, location, time, players,
                timestamp: Date.now()
            };
            channel.publish('message', raidData);
            appendMessage(raidData);
            toggleRaidForm();
        }

        function toggleRaidForm() {
            document.getElementById('raidModal').classList.toggle('hidden');
        }

        function joinRaid(btn) {
            btn.innerHTML = `✅ Joined! <i class="fas fa-check ml-1"></i>`;
            btn.disabled = true;
            setTimeout(() => {
                if (channel) {
                    const joinMsg = { username: currentUsername, team: currentTeam, text: "🚀 I'm joining this raid!", timestamp: Date.now(), type: 'chat' };
                    channel.publish('message', joinMsg);
                    appendMessage(joinMsg);
                }
            }, 600);
        }

        // ====================== MAP ======================
        function initMap() {
            if (map) return;
            const mapDiv = document.getElementById('map');
            map = L.map(mapDiv, { zoomControl: true, attributionControl: false }).setView([28.5, -81.3], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                map.setView([latitude, longitude], 15);
                L.marker([latitude, longitude], {
                    icon: L.divIcon({ className: 'user-dot', html: '🧭', iconSize: [32, 32] })
                }).addTo(map).bindPopup('<b>You are here</b>');
            }, () => alert("GPS access needed for accurate map"));
        }

        function toggleTab(tab) {
            document.getElementById('chatInterface').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('mapInterface').classList.toggle('hidden', tab !== 'map');
            if (tab === 'map') {
                if (!map) initMap();
                document.getElementById('bottomNav').classList.add('hidden'); // clean look
            } else {
                document.getElementById('bottomNav').classList.remove('hidden');
            }
        }

        async function reportLocation(type) {
            if (!navigator.geolocation) return alert("GPS not available");
            
            const pokemonName = prompt(type === 'spawn' 
                ? "Which Pokémon spawned? (e.g. Pikachu)" 
                : "Which Pokémon is nesting?");

            if (!pokemonName) return;

            navigator.geolocation.getCurrentPosition(async pos => {
                const report = {
                    type,
                    username: currentUsername,
                    team: currentTeam,
                    pokemon: pokemonName.trim(),
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    timestamp: Date.now(),
                    expires: Date.now() + (type === 'spawn' ? 15*60*1000 : 24*60*60*1000)
                };
                await channel.publish(type, report);
                addMapMarker(report);
                alert(`✅ ${type.toUpperCase()} reported live to your group!`);
            });
        }

        function addMapMarker(data) {
            if (Date.now() > data.expires) return;

            const id = getPokemonId(data.pokemon);
            const iconUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

            const icon = L.icon({ iconUrl, iconSize: [42, 42], popupAnchor: [0, -15] });

            const marker = L.marker([data.lat, data.lng], { icon })
                .addTo(map)
                .bindPopup(`
                    <div class="text-center p-1">
                        <img src="${iconUrl}" class="mx-auto w-12 h-12 drop-shadow-md">
                        <p class="font-bold text-base">${data.pokemon}</p>
                        <p class="text-xs text-gray-600">${data.type.toUpperCase()} • ${data.username}</p>
                    </div>
                `);

            markers.set(data.timestamp, marker);

            setTimeout(() => {
                if (markers.has(data.timestamp)) {
                    map.removeLayer(markers.get(data.timestamp));
                    markers.delete(data.timestamp);
                }
            }, data.expires - Date.now());
        }

        function centerMyLocation() {
            if (!map) return;
            navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            });
        }

        // Floating mode
        function toggleFloatingMode() {
            const chatUI = document.getElementById('chatInterface');
            const toggleBtn = document.getElementById('floatingToggle');

            isFloating = !isFloating;
            if (isFloating) {
                chatUI.classList.add('floating-mode');
                toggleBtn.classList.remove('hidden');
            } else {
                chatUI.classList.remove('floating-mode');
                toggleBtn.classList.add('hidden');
            }
        }

        function shareGroup() {
            const msg = currentGroup === 'GLOBAL' 
                ? "🌍 Join me in PokeRaid Global Chat!" 
                : `🔒 Private group code: ${currentGroup}\nPaste when joining PokeRaid Chat`;
            navigator.clipboard.writeText(msg).then(() => alert("✅ Copied to clipboard – share with your raid group!"));
        }

        function leaveChat() {
            if (confirm("Leave this raid hub?")) {
                if (channel) channel.presence.leave();
                if (ably) ably.close();
                location.reload();
            }
        }

        // PWA install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').classList.remove('hidden');
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installPrompt').classList.add('hidden');
            }
        }

        function dismissInstall() {
            document.getElementById('installPrompt').classList.add('hidden');
        }

        // START APP
        initTailwind();
        console.log('%c🚀 PokeRaid Chat + Live Map fully loaded! (Ably + Leaflet + PokeAPI)', 'color:#6C5CE7; font-size:13px; font-weight:bold');
    </script>
</body>
</html>
