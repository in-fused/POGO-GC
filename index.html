<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PokeRaid</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen">
  <div class="lcard">
    <div class="llogo">
      <div class="licon">&#x26A1;</div>
      <h1>Poke<em>Raid</em></h1>
      <p>Real data &middot; Smart map &middot; Live coordination</p>
    </div>
    <div class="fgrp">
      <label class="flbl">Trainer Name</label>
      <input id="loginName" class="fin" type="text" placeholder="AshKetchum99" maxlength="20" autocomplete="off">
    </div>
    <div class="fgrp">
      <label class="flbl">Your Team</label>
      <div class="tgrid">
        <button type="button" id="btn-mystic"   class="tbtn tb-m" onclick="selTeam('mystic',this)">&#x1F4A7; Mystic</button>
        <button type="button" id="btn-valor"    class="tbtn tb-v" onclick="selTeam('valor',this)">&#x1F525; Valor</button>
        <button type="button" id="btn-instinct" class="tbtn tb-i" onclick="selTeam('instinct',this)">&#x26A1; Instinct</button>
      </div>
    </div>
    <div class="fgrp">
      <label class="flbl">Group Code <small>(optional)</small></label>
      <input id="loginGroup" class="fin" type="text" placeholder="DOWNTOWNRAIDS" maxlength="20" style="text-transform:uppercase" autocomplete="off">
    </div>
    <button type="button" class="joinbtn" onclick="joinChat()">JOIN RAID HUB &rarr;</button>
  </div>
</div>

<!-- APP -->

<div id="app">
  <div class="topbar">
    <div class="tbar-l">
      <div class="tbar-em">&#x26A1;</div>
      <div>
        <div class="tbar-title" id="appTitle">Poke<em>Raid</em></div>
        <div class="tbar-sub"><span class="ldot"></span><span id="statTxt">Connecting&hellip;</span></div>
      </div>
    </div>
    <div class="tbar-r">
      <button type="button" class="tbarbtn" onclick="toggleFloat()"><i class="fas fa-window-restore"></i></button>
      <button type="button" class="tbarbtn" onclick="shareGroup()"><i class="fas fa-share-alt"></i></button>
      <button type="button" class="tbarbtn" style="color:#ff4b4b" onclick="leaveChat()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>
  <div class="tabbar">
    <button type="button" id="tab-chat"  class="tabt" onclick="goTab('chat')"><span class="ti">&#x1F4AC;</span>Chat</button>
    <button type="button" id="tab-map"   class="tabt" onclick="goTab('map')"><span class="ti">&#x1F5FA;</span>Map</button>
    <button type="button" id="tab-raids" class="tabt" onclick="goTab('raids')"><span class="ti">&#x2694;</span>Raids</button>
    <button type="button" id="tab-guide" class="tabt" onclick="goTab('guide')"><span class="ti">&#x1F4D6;</span>Guide</button>
    <button type="button" id="tab-me"    class="tabt" onclick="goTab('me')"><span class="ti">&#x1F9D1;</span>Me</button>
  </div>

  <!-- CHAT -->

  <div id="pane-chat" class="pane">
    <div id="raidStrip"></div>
    <div class="ctabs">
      <button type="button" class="ctab on" data-c="general" onclick="switchChat('general')">&#x1F4AC; Chat</button>
      <button type="button" class="ctab" data-c="raids" onclick="switchChat('raids')">&#x2694;&#xFE0F; Raids</button>
      <button type="button" class="ctab" data-c="flex" onclick="switchChat('flex')">&#x1F3C6; Flex</button>
    </div>
    <div id="feed-general" class="cfeed vis"></div>
    <div id="feed-raids" class="cfeed"></div>
    <div id="feed-flex" class="cfeed"></div>
    <div class="chatfoot">
      <div id="onlineRow" class="onrow"></div>
      <div class="inrow">
        <button type="button" class="rfab" onclick="openRaidModal()">&#x2694;&#xFE0F;</button>
        <div class="mwrap">
          <input id="msgIn" type="text" placeholder="Message or raid tip&hellip;" autocomplete="off">
          <label id="imgLbl" class="imgbtnlbl" style="display:none">
            <i class="fas fa-camera"></i>
            <input id="imgInput" type="file" accept="image/*" onchange="handleImgUpload(this)" style="display:none">
          </label>
          <button type="button" class="sndbtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAP -->

  <div id="pane-map" class="pane">
    <div id="map"></div>
    <div id="wHUD">
      <div class="wload" id="wLoad">&#x1F4E1; Loading weather&hellip;</div>
      <div class="wbody" id="wBody">
        <div class="wtop">
          <div id="wIcon" class="wicon"></div>
          <div><div id="wCond" class="wcond"></div><div id="wTemp" class="wtemp"></div></div>
        </div>
        <div id="wLbl" class="wlbl"></div>
        <div id="wTypes" class="wtypes"></div>
      </div>
    </div>
    <div id="raidBoard">
      <div class="rb-hd">
        <span>&#x2694;&#xFE0F; Raid Bosses</span>
        <button type="button" class="rb-cl" onclick="toggleRB()">&#x2715;</button>
      </div>
      <div id="rbContent"><div style="color:#8090a8;font-size:12px">Loading&hellip;</div></div>
    </div>
    <div id="biomeP"></div>
    <div class="mfabs">
      <button type="button" class="mfab mf-r" onclick="toggleRB()">&#x2694;&#xFE0F;</button>
      <button type="button" class="mfab mf-c" onclick="centerMap()">&#x1F9ED;</button>
      <button type="button" class="mfab mf-w" onclick="refreshWx()">&#x1F300;</button>
      <button type="button" class="mfab mf-p" id="mfabPin" onclick="togglePinMode()">&#x1F4CD;</button>
    </div>
  </div>

  <!-- RAIDS -->

  <div id="pane-raids" class="pane" style="flex-direction:column">
    <div class="raids-top">
      <input id="rSearch" class="rsearch" type="search" placeholder="Search raid boss&hellip;" autocomplete="off">
      <div class="fpills">
        <button type="button" class="fpill fp-all on"     data-f="all"    onclick="setFilter('all')">All</button>
        <button type="button" class="fpill fp-t5 off"     data-f="t5"     onclick="setFilter('t5')">T5 Legendary</button>
        <button type="button" class="fpill fp-mega off"   data-f="mega"   onclick="setFilter('mega')">Mega</button>
        <button type="button" class="fpill fp-shadow off" data-f="shadow" onclick="setFilter('shadow')">Shadow</button>
        <button type="button" class="fpill fp-t3 off"     data-f="t3"     onclick="setFilter('t3')">T3</button>
        <button type="button" class="fpill fp-t1 off"     data-f="t1"     onclick="setFilter('t1')">T1</button>
      </div>
    </div>
    <div class="rinner" id="bossGrid">
      <div class="empty"><div class="eicon">&#x23F3;</div><p>Fetching live raid bosses&hellip;</p></div>
    </div>
  </div>

  <!-- GUIDE -->

  <div id="pane-guide" class="pane" style="flex-direction:column">
    <div class="guide-top">
      <div class="gtabs">
        <button type="button" class="gtab on" data-g="shinies"  onclick="switchG('shinies')">&#x2728; Shinies</button>
        <button type="button" class="gtab"    data-g="dittos"   onclick="switchG('dittos')">&#x1F5C3; Dittos</button>
        <button type="button" class="gtab"    data-g="nests"    onclick="switchG('nests')">&#x1F333; Nests</button>
        <button type="button" class="gtab"    data-g="weather"  onclick="switchG('weather')">&#x1F327; Weather</button>
        <button type="button" class="gtab"    data-g="migrate"  onclick="switchG('migrate')">&#x23F0; Migration</button>
      </div>
    </div>
    <div class="gbody">
      <div class="gsec vis" id="guide-shinies">
        <input id="shinySearch" class="gsearch" type="search" placeholder="Search Pok&eacute;mon&hellip;" autocomplete="off">
        <div id="shinyList"><div class="empty"><div class="eicon">&#x23F3;</div><p>Loading&hellip;</p></div></div>
      </div>
      <div class="gsec" id="guide-dittos">
        <div id="dittoList"><div class="empty"><div class="eicon">&#x23F3;</div><p>Loading&hellip;</p></div></div>
      </div>
      <div class="gsec" id="guide-nests">
        <div id="nestList"><div class="empty"><div class="eicon">&#x23F3;</div><p>Loading&hellip;</p></div></div>
      </div>
      <div class="gsec" id="guide-weather"><div id="wxGuide"></div></div>
      <div class="gsec" id="guide-migrate"><div id="migrateDiv"></div></div>
    </div>
  </div>

  <!-- ME -->

  <div id="pane-me" class="pane" style="flex-direction:column">
    <div class="mebody">
      <div id="trainerCard" class="tcard none">
        <div class="tname" id="trainerName">&mdash;</div>
        <div class="tteam" id="trainerTeam"></div>
      </div>
      <div class="mesec">
        <div class="mestitle">Friend Code</div>
        <div class="mecard">
          <label class="melbl">Your Trainer Code</label>
          <input id="fcInput" class="meinp" type="text" placeholder="0000 0000 0000" maxlength="20" inputmode="numeric" autocomplete="off">
          <div class="mebtnrow">
            <button type="button" class="mebtn mb-save" onclick="saveFC()">Save</button>
            <button type="button" class="mebtn mb-copy" onclick="copyFC()">Copy</button>
          </div>
        </div>
      </div>
      <div class="mesec">
        <div class="mestitle">Live Weather</div>
        <div class="mecard">
          <label class="melbl">OpenWeatherMap Key<small style="display:block;font-size:10px;color:#5a6a82;text-transform:none;font-weight:400;margin-top:2px;letter-spacing:0">Free at openweathermap.org</small></label>
          <input id="owmInput" class="meinp" type="text" placeholder="Paste your free OWM key" autocomplete="off">
          <div class="mebtnrow"><button type="button" class="mebtn mb-save" onclick="saveOWM()">Save Key</button></div>
        </div>
      </div>
      <div class="mesec">
        <div class="mestitle">Group</div>
        <div class="mecard">
          <div class="merow"><span class="mekey">Current Group</span><span class="meval" id="groupDisplay">GLOBAL</span></div>
          <div class="mebtnrow"><button type="button" class="mebtn mb-leave" onclick="leaveGroup()">Reset to Global</button></div>
        </div>
      </div>
      <div class="mesec">
        <div class="mestitle">Data Sources</div>
        <div class="mecard" id="dataSources" style="padding:8px 14px"><div style="color:#8090a8;font-size:12px">Loading&hellip;</div></div>
      </div>
    </div>
  </div>
</div>

<button type="button" id="floatBtn" onclick="toggleFloat()">&#x1F4AC;</button>

<!-- RAID MODAL -->

<div id="raidModal" class="moverlay" onclick="closeBg(event,'raidModal')">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">&#x2694;&#xFE0F; Post a Raid</div>
    <div class="mgrp">
      <label class="mlbl">Pok&eacute;mon / Boss</label>
      <input id="mBoss" class="min" type="text" placeholder="Kyogre" list="bossDL">
      <datalist id="bossDL"></datalist>
    </div>
    <div class="mgrp">
      <label class="mlbl">Gym Location</label>
      <div class="mloc-wrap">
        <input id="mLoc" class="min" type="text" placeholder="Central Park Gym" oninput="geoSuggest()" autocomplete="off">
        <button type="button" class="mpickbtn" onclick="pickLocationForRaid()">&#x1F4CD;</button>
      </div>
      <div id="mLocDrop" class="geo-drop"></div>
    </div>
    <div class="mrow2">
      <div class="mgrp"><label class="mlbl">Time</label><input id="mTime" class="min" type="time"></div>
      <div class="mgrp"><label class="mlbl">Players</label>
        <select id="mPlayers" class="min"><option>1+</option><option>3+</option><option selected>5+</option><option>10+</option></select>
      </div>
    </div>
    <button type="button" class="mpostbtn" onclick="postRaid()">POST RAID</button>
  </div>
</div>

<!-- MAP REPORT MODAL -->
<div id="mapReport" class="moverlay" onclick="closeBg(event,'mapReport')">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">&#x1F4CD; Report Sighting</div>
    <div class="mgrp">
      <label class="mlbl">Type</label>
      <select id="mrType" class="min" onchange="mrTypeChange()">
        <option value="spawn">&#x1F3AE; Pokemon Spawn</option>
        <option value="gym">&#x2694;&#xFE0F; Gym</option>
        <option value="stop">&#x1F4CC; Pokestop</option>
      </select>
    </div>
    <div class="mgrp">
      <label class="mlbl" id="mrNameLbl">Pokemon spotted</label>
      <input id="mrName" class="min" type="text" placeholder="e.g. Dragonite" autocomplete="off">
    </div>
    <button type="button" class="mpostbtn" onclick="submitMapReport()">PIN IT</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
